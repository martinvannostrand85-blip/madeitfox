<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- left ear -->
  <polygon points="10,5 28,42 0,42" fill="#FF4500"/>
  <!-- right ear -->
  <polygon points="90,5 100,42 72,42" fill="#FF4500"/>
  <!-- inner left ear -->
  <polygon points="13,12 25,38 4,38" fill="#cc3700"/>
  <!-- inner right ear -->
  <polygon points="87,12 96,38 75,38" fill="#cc3700"/>
  <!-- head -->
  <ellipse cx="50" cy="63" rx="42" ry="36" fill="#FF4500"/>
  <!-- white muzzle -->
  <ellipse cx="50" cy="77" rx="22" ry="18" fill="#f5f0e8"/>
  <!-- left eye -->
  <ellipse cx="35" cy="58" rx="5.5" ry="6" fill="#1a1a1a"/>
  <!-- right eye -->
  <ellipse cx="65" cy="58" rx="5.5" ry="6" fill="#1a1a1a"/>
  <!-- left eye shine -->
  <ellipse cx="37" cy="55.5" rx="2" ry="2.2" fill="#fff" opacity="0.55"/>
  <!-- right eye shine -->
  <ellipse cx="67" cy="55.5" rx="2" ry="2.2" fill="#fff" opacity="0.55"/>
  <!-- nose -->
  <ellipse cx="50" cy="73" rx="3.5" ry="2.5" fill="#1a1a1a"/>
  <!-- top hat brim -->
  <rect x="24" y="32" width="52" height="6" rx="1" fill="#1a1a1a"/>
  <!-- top hat body -->
  <rect x="30" y="9" width="40" height="25" rx="2" fill="#1a1a1a"/>
  <!-- hat band -->
  <rect x="30" y="29" width="40" height="5" fill="#FF4500"/>
</svg>
